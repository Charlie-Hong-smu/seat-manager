<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>班主任座位管理</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div>
          <h1>小张专用座位管理器</h1>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">学生人数</div>
            <div class="stat-value" id="studentCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">座位总数</div>
            <div class="stat-value" id="seatTotal">0</div>
          </div>
        </div>
        <button id="toggleSidebarBtn" class="ghost">收起侧栏</button>
      </header>

      <main class="layout">
        <section class="panel controls">
          <div class="panel-section">
            <div class="panel-header">
              <h2>学生搜索</h2>
              <p>点击座位即可添加奖罚，也可在这里搜索</p>
            </div>
            <div class="add-student">
              <input id="studentNameInput" type="text" placeholder="输入姓名，回车添加" maxlength="20" />
              <select id="studentGenderSelect">
                <option value="">未知</option>
                <option value="男">男</option>
                <option value="女">女</option>
              </select>
              <button id="addStudentBtn">添加</button>
            </div>
            <div class="search-bar">
              <input id="studentSearchInput" type="text" placeholder="搜索姓名（支持模糊匹配）" />
            </div>
            <div id="searchResults" class="student-list"></div>
          </div>

          <div class="panel-section">
            <div class="panel-header">
              <h2>抽签</h2>
              <p>可选去重模式，抽签结果自动保存</p>
            </div>
            <div class="draw-controls">
              <label>
                抽签人数
                <input id="drawCount" type="number" min="1" value="1" />
              </label>
              <label class="checkbox">
                <input id="noRepeat" type="checkbox" />
                去重模式
              </label>
              <div class="draw-actions">
                <button id="drawBtn" class="primary">开始抽签</button>
                <button id="resetDrawBtn" class="ghost">重置抽签</button>
              </div>
            </div>
            <div id="drawStatus" class="draw-status"></div>
            <div id="drawResults" class="draw-results"></div>
          </div>

          <div class="panel-section">
            <div class="panel-header">
              <h2>座位调整</h2>
              <p>固定 8 列，自动扩展行数</p>
            </div>
            <div class="seat-actions">
              <button id="shuffleSeatsBtn" class="primary">随机调整座位</button>
              <button id="resetSeatsBtn" class="ghost">按名单顺序</button>
            </div>
            <label class="checkbox">
              <input id="pairByGender" type="checkbox" />
              随机时尽量男女同桌
            </label>
          </div>

          <div class="panel-section">
            <div class="panel-header">
              <h2>导入与导出</h2>
              <p>支持 Excel / CSV 导入，导出座位表</p>
            </div>
            <div class="import-controls">
              <input id="importFileInput" type="file" accept=".xlsx,.xls,.csv" />
              <label class="checkbox">
                <input id="importReplace" type="checkbox" checked />
                导入后覆盖现有名单
              </label>
              <button id="importBtn" class="primary">导入名单</button>
            </div>
            <div id="importStatus" class="draw-status"></div>
            <div class="seat-actions">
              <button id="exportSeatsBtn" class="ghost">导出座位表 CSV</button>
            </div>
            <div class="backup-actions">
              <button id="exportBackupBtn" class="ghost">导出备份 JSON</button>
              <input id="importBackupInput" type="file" accept=".json" />
              <button id="importBackupBtn" class="primary">导入备份 JSON</button>
            </div>
          </div>

          <div class="panel-section">
            <div class="panel-header">
              <h2>成绩导入</h2>
              <p>导入成绩表后可编辑考试名称与日期</p>
            </div>
            <div class="import-controls">
              <input id="scoreFileInput" type="file" accept=".xlsx,.xls,.csv" />
              <button id="parseScoreBtn" class="primary">解析成绩表</button>
            </div>
            <div class="score-edit">
              <input id="scoreExamName" type="text" placeholder="考试名称" maxlength="30" />
              <input id="scoreExamDate" type="date" />
              <button id="saveScoreBtn" class="ghost" disabled>保存考试</button>
            </div>
            <div id="scoreStatus" class="draw-status"></div>
          </div>

          <div class="panel-section">
            <div class="panel-header">
              <h2>历史座位</h2>
              <p>手动确认后保存为历史版本</p>
            </div>
            <div class="seat-actions">
              <button id="saveHistoryBtn" class="primary">保存当前座位</button>
            </div>
            <div id="historyList" class="history-list"></div>
          </div>
        </section>

        <section class="panel seating">
          <div class="panel-header">
            <h2>座位布局</h2>
            <p>每两列为同桌一组，共 4 组 · 可拖动交换座位</p>
          </div>
          <div class="seat-grid-wrap">
            <div class="row-labels" id="rowLabels"></div>
            <div class="seat-groups" id="seatGroups"></div>
          </div>
        </section>
      </main>
    </div>

    <div id="recordModal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-header">
          <div>
            <div class="modal-subtitle">奖罚记录</div>
            <h3 id="recordStudentName">学生</h3>
          </div>
          <div class="modal-actions">
            <button id="deleteStudentBtn" class="danger">删除学生</button>
            <button id="recordClose" class="ghost">关闭</button>
          </div>
        </div>
        <div class="record-actions">
          <input id="recordNoteInput" type="text" placeholder="备注（可选）" maxlength="40" />
          <button id="addRewardBtn" class="primary">+ 奖</button>
          <button id="addPunishBtn" class="danger">+ 罚</button>
          <button id="addNoteBtn" class="ghost">+ 备注</button>
        </div>
        <div class="apply-section">
          <div class="apply-controls">
            <div>同步到其他学生（可选）</div>
            <div class="apply-buttons">
              <button id="applyAllBtn" class="ghost">全选</button>
              <button id="applyClearBtn" class="ghost">清空</button>
            </div>
          </div>
          <input id="applySearchInput" type="text" placeholder="搜索姓名" />
          <div id="applyList" class="apply-list"></div>
        </div>
        <div class="record-week">
          <label for="weekSelect">查看周</label>
          <select id="weekSelect"></select>
        </div>
        <div id="recordList" class="record-list"></div>
        <div class="exam-section">
          <div class="exam-title">考试成绩</div>
          <div id="examList" class="exam-list"></div>
          <div class="exam-trend-header">
            <div class="exam-title">成绩趋势</div>
            <button id="exportTrendsBtn" class="ghost" disabled>导出趋势 PDF</button>
          </div>
          <div id="examTrends" class="exam-trends"></div>
        </div>
      </div>
    </div>

    <div id="mappingModal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-header">
          <div>
            <div class="modal-subtitle">成绩导入</div>
            <h3>列映射设置</h3>
          </div>
          <button id="mappingClose" class="ghost">关闭</button>
        </div>
        <div class="draw-status">
          未能可靠识别列，请手动选择姓名列和各科列。
        </div>
        <div id="mappingList" class="mapping-list"></div>
        <div class="mapping-actions">
          <button id="mappingCancel" class="ghost">取消</button>
          <button id="mappingApply" class="primary">应用映射</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <div id="easterModal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
          <div class="modal-header">
          <div>
            <h3>给小张的话</h3>
          </div>
          <button id="easterClose" class="ghost">关闭</button>
        </div>
        <div id="easterText" class="easter-text"></div>
      </div>
    </div>

    <div id="historyModal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-header">
          <div>
            <div class="modal-subtitle">历史座位</div>
            <h3 id="historyTitle">历史座位表</h3>
          </div>
          <button id="historyClose" class="ghost">关闭</button>
        </div>
        <div id="historyGrid" class="history-grid">
          <div id="historyGridInner" class="history-grid-inner"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
